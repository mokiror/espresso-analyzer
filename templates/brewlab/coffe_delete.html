{% extends 'brewlab/base.html' %}

{% block title %}Удаление сорта кофе {% endblock %}

{% block content %}
<div class="coffee-header">
    <div class="container">
        <h1>Подтверждение удаления</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="coffee-card">
                <h3>Вы уверены, что хотите удалить сорт "{{ object.name }}"?</h3>
                <p class="text-muted">Также будут удалены все связанные c ним рецепты!!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'brewlab:coffee_detail' object.pk %}" class="btn btn-secondary">❌ Отмена!! </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
