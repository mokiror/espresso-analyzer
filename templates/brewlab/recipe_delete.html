{% extends 'brewlab/base.html' %}

{% block title %}Удаление рецепта{% endblock %}

{% block content %}
<div class="coffee-header">
    <div class="container">
        <h1>Подтверждение удаления</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="coffee-card">
                <h3>Вы уверены, что хотите удалить рецепт "{{ object.name }}"?</h3>
                <p class="text-muted">Также будет удалён прогноз вкуса!!</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'brewlab:recipe_detail' object.pk %}" class="btn btn-secondary">❌ Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
